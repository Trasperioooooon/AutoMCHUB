<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AutoMCHUB · MC 一键开服</title>
<script>
/* 主题需在样式表生效前落到 <html>，避免切页闪烁。
   偏好三态 auto/light/dark 存 dataset.themePref；auto 解析为系统色。
   优先级：URL 参数 > 记忆 > auto（跟随系统）。 */
(function () {
  var q = new URLSearchParams(location.search).get("theme");
  var pref = q || localStorage.getItem("amh_theme") || "auto";
  var sys = matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark";
  var root = document.documentElement;
  root.dataset.themePref = pref;
  root.dataset.theme = (pref === "auto") ? sys : pref;
})();
</script>
