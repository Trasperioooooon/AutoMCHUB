name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
      - name: Build
        run: go build -trimpath -ldflags="-s -w -H windowsgui" -o AutoMCHUB.exe .
      - name: Checksums
        shell: pwsh
        run: |
          $h = (Get-FileHash AutoMCHUB.exe -Algorithm SHA256).Hash.ToLower()
          "$h *AutoMCHUB.exe" | Out-File -Encoding ascii SHA256SUMS
      - name: Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            AutoMCHUB.exe
            SHA256SUMS
          generate_release_notes: true
