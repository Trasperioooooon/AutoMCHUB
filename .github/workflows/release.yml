name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - name: Build
        run: go build -trimpath -ldflags="-s -w -H windowsgui" -o AutoMCHUB.exe .
      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: AutoMCHUB.exe
          generate_release_notes: true
